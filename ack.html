<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Επιβεβαίωση Ολοκλήρωσης Εργασίας — ΡΟΔΙΟΣ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: linear-gradient(135deg, #1a2744 0%, #0d1729 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  color: #1f2937;
}
.card {
  background: white;
  border-radius: 16px;
  padding: 40px;
  max-width: 600px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  text-align: center;
}
.icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin: 0 auto 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
}
.icon.success { background: #d1fae5; color: #059669; }
.icon.error { background: #fee2e2; color: #dc2626; }
.icon.info { background: #dbeafe; color: #2563eb; }
.icon.loading { background: #f3f4f6; color: #6b7280; }
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #e5e7eb;
  border-top-color: #1a2744;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
h1 {
  color: #1a2744;
  font-size: 24px;
  margin-bottom: 16px;
  font-weight: 700;
}
.order-num {
  background: #1a2744;
  color: #c9a961;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 20px;
  font-weight: 700;
  display: inline-block;
  margin: 16px 0;
  letter-spacing: 1px;
}
p {
  color: #4b5563;
  line-height: 1.6;
  margin: 12px 0;
  font-size: 15px;
}
.footer {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid #e5e7eb;
  color: #6b7280;
  font-size: 13px;
}
.gold-line {
  width: 60px;
  height: 4px;
  background: #c9a961;
  margin: 0 auto 24px;
  border-radius: 2px;
}
.info-box {
  background: #f0f9ff;
  border-left: 4px solid #0ea5e9;
  padding: 16px;
  border-radius: 8px;
  margin: 20px 0;
  text-align: left;
}
.info-box p { margin: 4px 0; font-size: 14px; }
.success-text { color: #059669; font-weight: 600; margin-top: 20px; }
</style>
</head>
<body>

<div class="card" id="app">
  <div class="icon loading"><div class="spinner"></div></div>
  <div class="gold-line"></div>
  <h1>Επεξεργασία...</h1>
  <p>Παρακαλώ περιμένετε</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Supabase credentials (anon key — same as in index.html, safe to expose)
const SUPABASE_URL = 'https://nzrdcgmrsfdmocyhfrod.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56cmRjZ21yc2ZkbW9jeWhmcm9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTg5MDMsImV4cCI6MjA4OTQ5NDkwM30.irU9tlBluAeTGcI0i3cc080OY7_nqR5js4ZPW8MC7b4';

const app = document.getElementById('app');

function render(html) {
  app.innerHTML = html;
}

function showError(message) {
  render(`
    <div class="icon error">✕</div>
    <div class="gold-line"></div>
    <h1>Σφάλμα Επικοινωνίας</h1>
    <p>${message}</p>
    <p style="color: #6b7280; font-size: 13px; margin-top: 20px;">
      Παρακαλώ επικοινωνήστε με την Υπηρεσία Αυτεπιστασίας.
    </p>
    <div class="footer">
      <p>ΡΟΔΙΟΣ — Αιτήματα Πολιτών</p>
    </div>
  `);
}

function showSuccess(orderNum) {
  const now = new Date().toLocaleString('el-GR', { 
    timeZone: 'Europe/Athens',
    dateStyle: 'medium',
    timeStyle: 'short'
  });
  render(`
    <div class="icon success">✓</div>
    <div class="gold-line"></div>
    <h1>Η δήλωση ολοκλήρωσης υποβλήθηκε επιτυχώς</h1>
    <div class="order-num">Εντολή Εργασίας ${orderNum}</div>
    <p>
      Με αυτό το σύνδεσμο αποστέλλεται η <strong>ολοκλήρωση και εκτέλεση 
      της εργασίας</strong> σύμφωνα με τους όρους της σύμβασης.
    </p>
    <div class="info-box">
      <p>📋 <strong>Επόμενα βήματα από την υπηρεσία:</strong></p>
      <p>• Άμεση εκκίνηση διαδικασιών παραλαβής</p>
      <p>• Έλεγχος εργασιών και ποιότητας από την Επιτροπή Παραλαβής</p>
      <p>• Επιτόπια αυτοψία (εφόσον απαιτείται)</p>
      <p>• Έκδοση Πρωτοκόλλου Οριστικής Παραλαβής</p>
    </div>
    <p class="success-text">
      ✓ Η εργασία ολοκληρώθηκε εντός των καθορισμένων χρονικών πλαισίων
    </p>
    <div class="footer">
      <p>ΡΟΔΙΟΣ — Αιτήματα Πολιτών</p>
      <p>Ημερομηνία/Ώρα Δήλωσης: ${now}</p>
    </div>
  `);
}

function showAlreadyAck(orderNum, ackDate) {
  const formattedDate = new Date(ackDate).toLocaleString('el-GR', {
    timeZone: 'Europe/Athens',
    dateStyle: 'medium',
    timeStyle: 'short'
  });
  render(`
    <div class="icon info">ℹ</div>
    <div class="gold-line"></div>
    <h1>Η δήλωση έχει ήδη υποβληθεί</h1>
    <div class="order-num">Εντολή Εργασίας ${orderNum}</div>
    <p>Η δήλωση ολοκλήρωσης για αυτή την εντολή έχει ήδη υποβληθεί.</p>
    <div class="info-box">
      <p>📅 <strong>Ημερομηνία υποβολής:</strong> ${formattedDate}</p>
      <p>✓ Η υπηρεσία έχει ενημερωθεί και η διαδικασία παραλαβής είναι σε εξέλιξη.</p>
    </div>
    <div class="footer">
      <p>ΡΟΔΙΟΣ — Αιτήματα Πολιτών</p>
    </div>
  `);
}

async function processAck() {
  // Get token from URL
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    showError('Λείπει ο σύνδεσμος επιβεβαίωσης.');
    return;
  }

  if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY === 'YOUR_ANON_KEY_HERE') {
    showError('Σφάλμα διαμόρφωσης. Επικοινωνήστε με τον διαχειριστή.');
    return;
  }

  try {
    // Initialize Supabase client
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Find the acknowledgment record
    const { data: existing, error: fetchError } = await supabase
      .from('work_order_acknowledgments')
      .select('*')
      .eq('ack_token', token)
      .maybeSingle();

    if (fetchError) {
      console.error('Fetch error:', fetchError);
      showError('Προέκυψε σφάλμα κατά τον έλεγχο του συνδέσμου.');
      return;
    }

    if (!existing) {
      showError('Ο σύνδεσμος δεν είναι έγκυρος.');
      return;
    }

    // Already acknowledged?
    if (existing.acknowledged_at) {
      showAlreadyAck(existing.order_num, existing.acknowledged_at);
      return;
    }

    // Mark as acknowledged
    const { error: updateError } = await supabase
      .from('work_order_acknowledgments')
      .update({
        acknowledged_at: new Date().toISOString(),
        manual_ack: false
      })
      .eq('ack_token', token);

    if (updateError) {
      console.error('Update error:', updateError);
      showError('Προέκυψε σφάλμα κατά την υποβολή.');
      return;
    }

    showSuccess(existing.order_num);
  } catch (e) {
    console.error('Unexpected error:', e);
    showError('Προέκυψε απρόσμενο σφάλμα.');
  }
}

// Run on page load
processAck();
</script>

</body>
</html>
